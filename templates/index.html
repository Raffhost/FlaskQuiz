<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flask Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="/"><button class="btn-new-game">Neues Spiel</button></a>
        <button class="btn-highscores">Highscores</button>
    </header>

    <main>
        <p class="question">{{ question }}</p>

        <div class="answers">
            {% for answer, correct in answers %}
            <form action="/answer" method="POST">
                <input type="hidden" name="is_correct" value="{{ '1' if correct else '0' }}">
                <button class="btn-answer" type="submit">{{ answer }}</button>
            </form>
            {% endfor %}
        </div>

        <div class="stats">
            <span>Points: {{ score }}</span>
            <span>Question {{ current }}/{{ total }}</span>
        </div>
    </main>
</body>
</html>
